<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Fortune | Blog</title>
  <meta name="description" content="Technical deep-dives, opinions, and field notes from Fluid Fortune.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:#050a05;--deep:#0d1117;--surface:#161b22;--panel:#1c2128;
      --border:#30363d;--border-bright:#3d4d3d;
      --green:#00ff41;--green-dim:#00c032;--green-mute:#1a3a1a;
      --amber:#ffb700;--blue:#58a6ff;--red:#f85149;
      --text:#e6edf3;--text-dim:#8b949e;--text-muted:#484f58;
      --font-mono:'Share Tech Mono',monospace;
      --font-ui:'Inter',sans-serif;
      --font-disp:'Orbitron',monospace;
      --max-w:760px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--deep);color:var(--text);font-family:var(--font-ui);line-height:1.7;min-height:100vh}

    /* NAV */
    nav{background:var(--black);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1.5rem;position:sticky;top:0;z-index:100}
    .nav-home{font-family:var(--font-disp);font-size:.8rem;color:var(--green);text-decoration:none;letter-spacing:.12em}
    .nav-home:hover{color:#fff}
    .nav-title{font-family:var(--font-mono);font-size:.65rem;color:var(--text-muted);letter-spacing:.1em}
    .nav-spacer{flex:1}
    .nav-filter{display:flex;gap:.5rem;flex-wrap:wrap}
    .filter-btn{background:none;border:1px solid var(--border);color:var(--text-muted);font-family:var(--font-mono);font-size:.58rem;letter-spacing:.1em;padding:.2rem .6rem;cursor:pointer;border-radius:3px;transition:.15s}
    .filter-btn:hover,.filter-btn.active{border-color:var(--green-dim);color:var(--green-dim)}

    /* HEADER */
    .blog-header{max-width:var(--max-w);margin:0 auto;padding:3rem 1.5rem 2rem}
    .blog-header h1{font-family:var(--font-disp);font-size:clamp(1.2rem,3vw,1.6rem);color:#fff;font-weight:900;letter-spacing:.08em;margin-bottom:.5rem}
    .blog-header p{font-size:.88rem;color:var(--text-dim);max-width:500px}
    .blog-divider{border:none;border-top:1px solid var(--border);margin:0 auto;max-width:var(--max-w);padding:0 1.5rem}

    /* POSTS */
    .posts{max-width:var(--max-w);margin:0 auto;padding:0 1.5rem 4rem}

    /* Post card */
    .post-card{border-bottom:1px solid var(--border);padding:2.5rem 0;position:relative;transition:border-color .2s}
    .post-card:last-child{border-bottom:none}
    .post-card:hover{border-bottom-color:var(--border-bright)}
    .post-card::before{content:'';position:absolute;left:-1.5rem;top:2.5rem;width:2px;height:0;background:var(--green-dim);transition:height .3s}
    .post-card:hover::before{height:calc(100% - 5rem)}

    .post-meta{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:.75rem}
    .post-date{font-family:var(--font-mono);font-size:.62rem;color:var(--text-muted);letter-spacing:.08em}
    .post-cat{font-family:var(--font-mono);font-size:.58rem;color:var(--green-dim);border:1px solid var(--green-mute);padding:.1rem .5rem;letter-spacing:.1em}
    .post-tag{font-family:var(--font-mono);font-size:.55rem;color:var(--text-muted);border:1px solid var(--border);padding:.1rem .4rem}
    .post-edited{font-family:var(--font-mono);font-size:.55rem;color:var(--text-muted);font-style:italic;margin-left:auto}

    .post-title{font-family:var(--font-disp);font-size:clamp(1rem,2.5vw,1.3rem);color:#fff;font-weight:700;letter-spacing:.04em;margin-bottom:.75rem;line-height:1.3}
    .post-title a{color:inherit;text-decoration:none;transition:color .15s}
    .post-title a:hover{color:var(--green-dim)}

    .post-excerpt{font-size:.9rem;color:var(--text-dim);line-height:1.7;margin-bottom:1.25rem}

    .post-read-more{font-family:var(--font-mono);font-size:.65rem;color:var(--green-dim);text-decoration:none;letter-spacing:.1em;border:1px solid var(--green-mute);padding:.3rem .8rem;display:inline-block;transition:.15s}
    .post-read-more:hover{background:var(--green-mute);color:var(--green)}

    /* States */
    .loading{text-align:center;padding:4rem 1.5rem;font-family:var(--font-mono);font-size:.8rem;color:var(--text-muted);letter-spacing:.1em}
    .loading::after{content:'';display:inline-block;width:6px;height:6px;background:var(--green-dim);border-radius:50%;margin-left:.5rem;animation:pulse 1s ease-in-out infinite}
    .empty{text-align:center;padding:4rem 1.5rem;font-family:var(--font-mono);font-size:.8rem;color:var(--text-muted)}
    .error{text-align:center;padding:4rem 1.5rem;font-family:var(--font-mono);font-size:.8rem;color:var(--red)}

    /* Load more */
    .load-more-wrap{text-align:center;padding:2rem 0}
    .load-more{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font-mono);font-size:.68rem;letter-spacing:.12em;padding:.5rem 1.5rem;cursor:pointer;transition:.15s}
    .load-more:hover{border-color:var(--green-dim);color:var(--green-dim)}

    /* Footer */
    footer{border-top:1px solid var(--border);padding:2rem 1.5rem;text-align:center;font-family:var(--font-mono);font-size:.62rem;color:var(--text-muted)}
    footer a{color:var(--green-dim);text-decoration:none}

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .post-card{animation:fadeIn .4s ease both}

    @media(max-width:600px){
      .nav-filter{display:none}
      .post-card::before{display:none}
      .post-card{padding:1.75rem 0}
    }
  </style>
</head>
<body>

<nav>
  <a href="https://fluidfortune.com" class="nav-home">FLUID FORTUNE</a>
  <span class="nav-title">// BLOG</span>
  <div class="nav-spacer"></div>
  <div class="nav-filter" id="filterWrap">
    <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">ALL</button>
    <button class="filter-btn" data-cat="tech" onclick="setFilter('tech',this)">TECH</button>
    <button class="filter-btn" data-cat="ai" onclick="setFilter('ai',this)">AI</button>
    <button class="filter-btn" data-cat="hardware" onclick="setFilter('hardware',this)">HARDWARE</button>
    <button class="filter-btn" data-cat="software" onclick="setFilter('software',this)">SOFTWARE</button>
    <button class="filter-btn" data-cat="culture" onclick="setFilter('culture',this)">CULTURE</button>
    <button class="filter-btn" data-cat="politics" onclick="setFilter('politics',this)">POLITICS</button>
    <button class="filter-btn" data-cat="philosophy" onclick="setFilter('philosophy',this)">PHILOSOPHY</button>
    <button class="filter-btn" data-cat="music" onclick="setFilter('music',this)">MUSIC</button>
    <button class="filter-btn" data-cat="opinion" onclick="setFilter('opinion',this)">OPINION</button>
    <button class="filter-btn" data-cat="project" onclick="setFilter('project',this)">PROJECTS</button>
  </div>
</nav>

<header class="blog-header">
  <h1>[ FIELD NOTES ]</h1>
  <p>Technical deep-dives, opinions, and dispatches from the forge. No SEO bait. No sponsored content. Just signal.</p>
</header>

<hr class="blog-divider">

<main class="posts" id="postsContainer">
  <div class="loading" id="loadingState">FETCHING SIGNAL</div>
</main>

<div class="load-more-wrap" id="loadMoreWrap" style="display:none">
  <button class="load-more" id="loadMoreBtn" onclick="loadMore()">LOAD OLDER ENTRIES</button>
</div>

<footer>
  <p><a href="https://fluidfortune.com">FLUID FORTUNE</a> &nbsp;|&nbsp; LOCAL INTELLIGENCE &nbsp;|&nbsp; <a href="https://fluidfortune.com#comms">CONTACT</a></p>
</footer>

<script>
  // ── CONFIG ────────────────────────────────────────────
  // Update this to your raw manifest URL once the blog repo is live
  const MANIFEST_URL = 'https://raw.githubusercontent.com/FluidFortune/blog/main/index.json';
  const POSTS_PER_PAGE = 5;

  let allPosts    = [];
  let filtered    = [];
  let currentPage = 0;
  let activeFilter = 'all';

  // ── INIT ──────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch(MANIFEST_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      allPosts = data.posts || [];
      applyFilter('all');
    } catch (e) {
      document.getElementById('loadingState').className = 'error';
      document.getElementById('loadingState').textContent =
        allPosts.length === 0
          ? 'No posts yet. The forge is warming up.'
          : `Signal lost: ${e.message}`;
    }
  }

  // ── FILTER ────────────────────────────────────────────
  function setFilter(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(cat);
  }

  function applyFilter(cat) {
    activeFilter  = cat;
    filtered      = cat === 'all' ? [...allPosts] : allPosts.filter(p => p.category === cat);
    currentPage   = 0;
    document.getElementById('postsContainer').innerHTML = '';
    document.getElementById('loadingState') && (document.getElementById('loadingState').remove());
    renderPage();
  }

  // ── RENDER ────────────────────────────────────────────
  function renderPage() {
    const container = document.getElementById('postsContainer');
    const start     = currentPage * POSTS_PER_PAGE;
    const slice     = filtered.slice(start, start + POSTS_PER_PAGE);

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">No posts in this category yet.</div>';
      document.getElementById('loadMoreWrap').style.display = 'none';
      return;
    }

    slice.forEach((post, i) => {
      const card = document.createElement('article');
      card.className = 'post-card';
      card.style.animationDelay = (i * 0.07) + 's';

      const created  = new Date(post.created);
      const modified = post.modified ? new Date(post.modified) : null;
      const isEdited = modified && post.created !== post.modified;

      const fmtDate = d => d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
      const fmtFull = d => d.toLocaleString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

      const tagPills = (post.tags || []).slice(0,4).map(t =>
        `<span class="post-tag">${t}</span>`
      ).join('');

      card.innerHTML = `
        <div class="post-meta">
          <span class="post-date">${fmtDate(created)}</span>
          <span class="post-cat">${(post.category || 'tech').toUpperCase()}</span>
          ${tagPills}
          ${isEdited ? `<span class="post-edited">edited ${fmtFull(modified)}</span>` : ''}
        </div>
        <h2 class="post-title"><a href="${post.url}">${post.title}</a></h2>
        ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ''}
        <a class="post-read-more" href="${post.url}">READ FULL POST →</a>
      `;
      container.appendChild(card);
    });

    currentPage++;

    const hasMore = currentPage * POSTS_PER_PAGE < filtered.length;
    document.getElementById('loadMoreWrap').style.display = hasMore ? 'block' : 'none';
  }

  function loadMore() { renderPage(); }

  init();
</script>
</body>
</html>
